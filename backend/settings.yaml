models:
  embedding: "BAAI/bge-small-en-v1.5"
  llm:
    provider: "groq"          # "groq" or "ollama"
    groq_profile: "llama3-fast"  # key under groq.providers
    standard: "qwen2.5:7b"    # used when provider=ollama
  captioning: "qwen2.5vl:7b"

embeddings:
  provider: huggingface
  dimension: 384
  normalize: true
  query_prefix: "Represent this sentence for searching relevant passages: "
  providers:
    huggingface:
      model_name: "BAAI/bge-small-en-v1.5"
      device: "cpu"
      trust_remote_code: false
    ollama:
      model_name: "nomic-embed-text"

ollama:
  base_url: "http://localhost:11434"
  timeout: 60
  # Clip embed input before /api/embed; Ollama may still 400 on long text even with truncate:true
  max_embed_chars: 12000

captioning:
  provider: gemini
  model: gemini-2.0-flash
  prompt: >
    Describe this technical diagram precisely.
    Include all visible labels, axis names, process steps,
    arrows, and relationships shown. Be specific about
    any numbered phases, lifecycle stages, or hierarchical
    structures visible.
  max_retries: 5
  retry_delay_s: 5
  retry_strategy: exponential
  retry_max_delay_s: 30
  retry_use_jitter: true
  rate_limit_delay_s: 65
  rate_limit_step_delay_s: 20
  rate_limit_max_delay_s: 180
  inter_image_delay_s: 5
  request_timeout_s: 60
  connect_timeout_s: 20
  keep_alive: "15m"
  max_image_px: 1024

gemini:
  api_base: "https://generativelanguage.googleapis.com/v1beta"
  api_key_env: "GEMINI_API_KEY"

groq:
  api_key_env: "GROQ_API_KEY"
  # Available models: llama-3.3-70b-versatile, llama-3.1-8b-instant, mixtral-8x7b-32768
  # llama-3.1-8b-instant is fastest; llama-3.3-70b-versatile is highest quality
  providers:
    llama3-fast:
      model: "llama-3.1-8b-instant"
      temperature: 0.1
      max_tokens: 1024
    llama3-quality:
      model: "llama-3.3-70b-versatile"
      temperature: 0.1
      max_tokens: 1024

retrieval:
  vector_store: faiss
  faiss_index_path: db/faiss_store/index.faiss
  faiss_id_map_path: db/faiss_store/id_map.json
  # Persist FAISS + id map every N chunks (0 = only at end). Avoids losing everything on crash.
  faiss_checkpoint_every: 10
  hnsw_M: 32
  hnsw_ef_construction: 200
  hnsw_ef_search: 100
  dense_top_k: 10
  sparse_top_k: 10
  rerank_top_n: 3
  rrf_k: 60
  confidence_threshold: 0.6
  dedup_threshold: 0.92